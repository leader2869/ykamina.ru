name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Package verified release
        working-directory: .
        run: |
          tar --exclude=.git --exclude=frontend/node_modules --exclude=frontend/.env.local -czf "$RUNNER_TEMP/release.tgz" .
      - uses: actions/upload-artifact@v4
        with:
          name: production-release
          path: ${{ runner.temp }}/release.tgz
          retention-days: 1

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ykamina.ru
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: production-release
          path: artifacts
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_PUBLIC_HOST: ${{ secrets.DATABASE_PUBLIC_HOST }}
          DATABASE_SSL_REJECT_UNAUTHORIZED: ${{ secrets.DATABASE_SSL_REJECT_UNAUTHORIZED }}
        run: |
          archive="/tmp/ykamina-${GITHUB_SHA}.tgz"
          script="/tmp/ykamina-artifact-deploy"
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes artifacts/release.tgz "$DEPLOY_USER@$DEPLOY_HOST:$archive"
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes deploy/server-artifact-deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:$script"
          {
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'DATABASE_PUBLIC_HOST=%s\n' "$DATABASE_PUBLIC_HOST"
            printf 'DATABASE_SSL_REJECT_UNAUTHORIZED=%s\n' "$DATABASE_SSL_REJECT_UNAUTHORIZED"
          } | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod 700 '$script'; '$script' '${GITHUB_SHA}' '$archive'"
