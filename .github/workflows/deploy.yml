name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ykamina.ru
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Configure application database
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_PUBLIC_HOST: ${{ secrets.DATABASE_PUBLIC_HOST }}
          DATABASE_SSL_REJECT_UNAUTHORIZED: ${{ secrets.DATABASE_SSL_REJECT_UNAUTHORIZED }}
        run: |
          {
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'DATABASE_PUBLIC_HOST=%s\n' "$DATABASE_PUBLIC_HOST"
            printf 'DATABASE_SSL_REJECT_UNAUTHORIZED=%s\n' "$DATABASE_SSL_REJECT_UNAUTHORIZED"
          } | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            'set -e; umask 077; env_file=/etc/ykamina/ykamina.env; temp_file=$(mktemp /tmp/ykamina-env.XXXXXX); if [ -f "$env_file" ]; then grep -vE "^(DATABASE_URL|DATABASE_PUBLIC_HOST|DATABASE_SSL_REJECT_UNAUTHORIZED)=" "$env_file" > "$temp_file" || true; fi; cat >> "$temp_file"; install -m 600 "$temp_file" "$env_file"; rm -f "$temp_file"; sudo /usr/bin/systemctl restart ykamina.service'
      - name: Deploy release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "candidate='/srv/ykamina/releases/${GITHUB_SHA}'; current=\$(readlink -f /srv/ykamina/current 2>/dev/null || true); if [ \"\$candidate\" != \"\$current\" ]; then rm -rf -- \"\$candidate\"; fi; env NODE_OPTIONS='--max-old-space-size=512' NEXT_TELEMETRY_DISABLED=1 /usr/local/bin/deploy-ykamina '${GITHUB_SHA}'"
