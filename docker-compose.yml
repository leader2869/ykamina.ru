services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ykamina
      POSTGRES_USER: ykamina
      POSTGRES_PASSWORD: ykamina_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./database/seeds/001_demo_data.sql:/docker-entrypoint-initdb.d/002_demo_data.sql:ro

volumes:
  postgres_data:
